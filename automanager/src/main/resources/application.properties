server.port=8091
# H2 em memória
spring.datasource.url=jdbc:h2:mem:automanager;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:automanager | User: sa | Senha: (vazia)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — segredo precisa ter >= 64 caracteres para HS512
jwt.secret=autobots-automanager-chave-secreta-super-longa-para-hs512-seguranca-minimo-64-chars-2024
jwt.expiration=86400000